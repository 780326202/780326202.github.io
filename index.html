<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>危险化学品知识图谱</title>
<style>
  :root {
    --bg: #f8fafc;
    --panel: rgba(255,255,255,0.94);
    --line: #cbd5e1;
    --text: #0f172a;
    --muted: #64748b;
  }
  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: var(--bg);
    font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif;
    color: var(--text);
  }
  #app {
    position: relative;
    width: 100%;
    height: 100%;
  }
  #graph {
    width: 100%;
    height: 100%;
    display: block;
    background:
      radial-gradient(circle at 20% 18%, rgba(59,130,246,0.05), transparent 22%),
      radial-gradient(circle at 78% 26%, rgba(244,63,94,0.05), transparent 22%),
      radial-gradient(circle at 62% 80%, rgba(16,185,129,0.05), transparent 20%),
      #f8fafc;
    cursor: grab;
  }
  #graph.dragging {
    cursor: grabbing;
  }
  .toolbar {
    position: absolute;
    top: 16px;
    left: 16px;
    z-index: 10;
    display: flex;
    gap: 8px;
    align-items: center;
    padding: 10px 12px;
    background: var(--panel);
    border: 1px solid rgba(255,255,255,0.8);
    border-radius: 16px;
    box-shadow: 0 12px 30px rgba(15,23,42,0.10);
    backdrop-filter: blur(10px);
  }
  .toolbar .title {
    font-size: 14px;
    font-weight: 700;
    margin-right: 8px;
  }
  .toolbar button {
    border: 1px solid #e2e8f0;
    background: white;
    color: var(--text);
    border-radius: 10px;
    min-width: 38px;
    height: 38px;
    padding: 0 10px;
    cursor: pointer;
    font-size: 16px;
  }
  .toolbar button:hover {
    box-shadow: 0 6px 16px rgba(15,23,42,0.08);
  }
  .info {
    position: absolute;
    right: 16px;
    top: 16px;
    z-index: 10;
    width: 340px;
    max-height: calc(100% - 32px);
    overflow: auto;
    padding: 16px 18px;
    background: var(--panel);
    border: 1px solid rgba(255,255,255,0.8);
    border-radius: 18px;
    box-shadow: 0 12px 30px rgba(15,23,42,0.10);
    backdrop-filter: blur(10px);
  }
  .info h2 {
    margin: 0 0 8px;
    font-size: 18px;
    line-height: 1.35;
  }
  .info .sub {
    color: var(--muted);
    font-size: 13px;
    line-height: 1.6;
    margin-bottom: 12px;
  }
  .info .meta {
    display: grid;
    grid-template-columns: 70px 1fr;
    gap: 8px 10px;
    font-size: 13px;
    line-height: 1.55;
  }
  .info .meta .k {
    color: var(--muted);
  }
  .info .box {
    margin-top: 12px;
    padding: 12px;
    border-radius: 14px;
    background: white;
    border: 1px solid #e2e8f0;
    font-size: 13px;
    line-height: 1.7;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .legend {
    margin-top: 12px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .legend div {
    font-size: 12px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .swatch {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    display: inline-block;
  }
  .edge {
    stroke: #cbd5e1;
    stroke-opacity: 0.45;
    stroke-width: 1;
  }
  .edge.table {
    stroke-opacity: 0.65;
    stroke-width: 1.2;
  }
  .edge.substance {
    stroke-opacity: 0.22;
    stroke-width: 0.8;
  }
  .node circle {
    stroke: white;
    stroke-width: 1.5;
  }
  .node text {
    font-size: 11px;
    fill: #334155;
    text-anchor: middle;
    dominant-baseline: hanging;
    pointer-events: none;
  }
  .node.category text {
    font-size: 14px;
    font-weight: 700;
  }
  .node.table text {
    font-size: 11px;
    font-weight: 600;
  }
  .node.root text {
    font-size: 16px;
    font-weight: 700;
  }
  .node.substance text {
    font-size: 9px;
  }
  .node.measure text, .node.overview text {
    font-size: 9px;
  }
  .node.selected circle {
    stroke: #111827;
    stroke-width: 2.4;
  }
  .node.selected text {
    fill: #111827;
    font-weight: 700;
  }
  .node.dim {
    opacity: 0.18;
  }
  .edge.dim {
    opacity: 0.08;
  }
  @media (max-width: 1100px) {
    .info { width: 290px; }
  }
</style>
</head>

  <div class="toolbar">

  <svg id="graph">
    <g id="viewport"></g>
  </svg>
</div>

入油脂/有机物）；干燥通风；与可燃物、还原剂分开存放；避免密闭高温环境；分批限量。\n危险标签：易燃、氧化性、热敏感\n储运标签：阴凉通风、防潮密闭、限量堆存、隔离不相容物", "size": 10, "color": "#d84b6b", "textColor": "#334155", "x": -51.66, "y": -2666.08}, {"id": "class1_table_1_r9", "label": "黑火药（火药粉）", "displayLabel": "黑火药（火药粉）", "type": "substance", "category": "class1", "table": "class1_table_1", "title": "黑火药（火药粉）\n序号: 9\n物质/物品名称: 黑火药（火药粉）\nCAS No.: —/无统一CAS（混合物）\n所属类别: 第1类\n典型危险性: 易燃爆，点火能量需求低；粉尘云有二次爆炸风险；燃烧速度快。\n运输储存条件: 防静电、防火花、防摩擦；密闭防潮包装；专库存放，严禁与氧化剂/火源同库；装卸轻放。", "tooltip": "名称：黑火药（火药粉）\nCAS：—/无统一CAS（混合物）\n类别：第1类\n危险性：易燃爆，点火能量需求低；粉尘云有二次爆炸风险；燃烧速度快。\n储运：防静电、防火花、防摩擦；密闭防潮包装；专库存放，严禁与氧化剂/火源同库；装卸轻放。\n危险标签：爆炸危险、易燃、粉尘爆炸风险\n储运标签：防潮密闭、防静电、专库分区、防震防摩擦", "size": 10, "color": "#d84b6b", "textColor": "#334155", "x": -26.0, "y": -2669.55}, {"id": "class2", "label": "第2类 气体", "displayLabel": "第2类 气体", "type": "category", "category": "class2", "table": null, "title": "第2类 气体", "tooltip": "第2类 气体", "size": 38, "color": "#2e86de", "textColor": "#2e86de", "x": 1370.42, "y": -1633.21}, {"id": "class2_overview", "label": "类别概述", "displayLabel": "概述", "type": "overview", "category": "class2", "table": null, "title": "类别概述\n第2类气体是指在运输/储存条件下以压缩气体、液化气体、深冷液化气体、溶解气体等形式存在的物质。其主要风险包括：\n①加压容器风险：受热、撞击或阀门损坏可能导致喷射、容器破裂，甚至发生BLEVE（沸腾液体膨胀蒸气爆炸）。\n②可燃性风险：与空气形成爆炸性混合物，遇火源可能燃烧、回火或爆炸。\n③助燃性风险：如氧气等可显著增强燃烧，使火势异常猛烈。\n④毒性/腐蚀性风险：泄漏后可造成中毒、刺激或腐蚀伤害（如氯气、氨气等）。\n⑤窒息风险：惰性气体或大量泄漏导致氧含量下降，引发缺氧窒息（如氮气、氩气、二氧化碳等）。\n⑥低温风险：深冷液化气体泄漏会造成冻伤、材料脆裂，并可能产生低洼积聚的窒息危险。\n注：第2类气体通常按性质进一步细分为：易燃气体（2.1）非易燃无毒气体（2.2）毒性气体（2.3）（不同法规体系表述略有差异，以标签/SDS为准）。\n典型危险性与运输储存条件概述\n化学品总体可分为易燃类、惰性/窒息类、助燃/强氧化类，以及有毒/腐蚀/自燃与强反应类。其中易燃品多具有燃烧范围宽、易聚合或受热分解等风险，储存需阴凉通风、远离热源火源、严防静电并使用专用气柜/钢瓶；惰性与窒息性气体虽“不燃”，但在密闭或低洼处易缺氧窒息，因此必须良好通风、监测浓度、气瓶固定；助燃与强氧化性物质（含富氧/氧化性气体）会显著加剧燃烧或与油脂有机物剧烈反应，应与易燃物严格隔离并控制温度；而剧毒、强腐蚀、自燃或遇水剧烈反应的特气（如部分氢化物/卤化物/强氧化性毒气等）风险最高，往往要求专用毒气柜、负压或密闭系统、尾气处理、严格防潮检漏、报警与应急防护，部分还需**阻聚剂、冷藏、溶剂稳定化（如乙炔溶于丙酮）**及定期检测，以降低聚合、分解或爆炸等失控风险。\n2.1：易燃气体 (Flammable Gases)\n危险性核心：极易燃烧，与空气混合形成爆炸性混合物。\n2.2：非易燃无毒气体 (Non-flammable, Non-toxic Gases)\n危险性核心：压力容器爆炸风险、窒息（置换氧气）、低温冻伤、部分具有氧化性。\n（注：序号50-54部分物质在GB标准中常归为2.3毒性气体或8类腐蚀品，表中备注了修正建议，按您的原分类列在2.2但需极度小心）\n2.3：毒性气体 (Toxic Gases)\n危险性核心：吸入致死，多具强腐蚀性或强氧化性。", "tooltip": "类别概述\n第2类气体是指在运输/储存条件下以压缩气体、液化气体、深冷液化气体、溶解气体等形式存在的物质。其主要风险包括：\n①加压容器风险：受热、撞击或阀门损坏可能导致喷射、容器破裂，甚至发生BLEVE（沸腾液体膨胀蒸气爆炸）。\n②可燃性风险：与空气形成爆炸性混合物，遇火源可能燃烧、回火或爆炸。\n③助燃性风险：如氧气等可显著增强燃烧，使火势异常猛烈。\n④毒性/腐蚀性风险：泄漏后可造成中毒、刺激或腐蚀伤害（如氯气、氨气等）。\n⑤窒息风险：惰性气体或大量泄漏导致氧含量下降，引发缺氧窒息（如氮气、氩气、二氧化碳等）。\n⑥低温风险：深冷液化气体泄漏会造成冻伤、材料脆裂，并可能产生低洼积聚的窒息危险。\n注：第2类气体通常按性质进一步细分为：易燃气体（2.1）非易燃无毒气体（2.2）毒性气体（2.3）（不同法规体系表述略有差异，以标签/SDS为准）。\n典型危险性与运输储存条件概述\n化学品总体可分为易燃类、惰性/窒息类、助燃/强氧化类，以及有毒/腐蚀/自燃与强反应类。其中易燃品多具有燃烧范围宽、易聚合或受热分解等风险，储存需阴凉通风、远离热源火源、严防静电并使用专用气柜/钢瓶；惰性与窒息性气体虽“不燃”，但在密闭或低洼处易缺氧窒息，因此必须良好通风、监测浓度、气瓶固定；助燃与强氧化性物质（含富氧/氧化性气体）会显著加剧燃烧或与油脂有机物剧烈反应，应与易燃物严格隔离并控制温度；而剧毒、强腐蚀、自燃或遇水剧烈反应的特气（如部分氢化物/卤化物/强氧化性毒气等）风险最高，往往要求专用毒气柜、负压或密闭系统、尾气处理、严格防潮检漏、报警与应急防护，部分还需**阻聚剂、冷藏、溶剂稳定化（如乙炔溶于丙酮）**及定期检测，以降低聚合、分解或爆炸等失控风险。\n2.1：易燃气体 (Flammable Gases)\n危险性核心：极易燃烧，与空气混合形成爆炸性混合物。\n2.2：非易燃无毒气体 (Non-flammable, Non-toxic Gases)\n危险性核心：压力容器爆炸风险、窒息（置换氧气）、低温冻伤、部分具有氧化性。\n（注：序号50-54部分物质在GB标准中常归为2.3毒性气体或8类腐蚀品，表中备注了修正建议，按您的原分类列在2.2但需极度小心）\n2.3：毒性气体 (Toxic Gases)\n危险性核心：吸入致死，多具强腐蚀性或强氧化性。", "size": 18, "color": "#94a3b8", "textColor": "#475569", "x": 1392.2, "y": -1779.19}, {"id": "class2_measure_1", "label": "措施1", "displayLabel": "①先识别气体…", "type": "measure", "category": "class2", "table": null, "title": "①先识别气体性质：可燃/助燃（氧气）/有毒（氯、氨等）/惰性（窒息）。", "tooltip": "①先识别气体性质：可燃/助燃（氧气）/有毒（氯、氨等）/惰性（窒息）。", "size": 15, "color": "#f59e0b", "textColor": "#b45309", "x": 1538.34, "y": -1719.07}, {"id": "class2_measure_2", "label": "措施2", "displayLabel": "②钢瓶火灾处…", "type": "measure", "category": "class2", "table": null, "title": "②钢瓶火灾处置：能安全关闭阀门就关闭；否则持续冷却钢瓶，建立大隔离距离。", "tooltip": "②钢瓶火灾处置：能安全关闭阀门就关闭；否则持续冷却钢瓶，建立大隔离距离。", "size": 15, "color": "#f59e0b", "textColor": "#b45309", "x": 1555.35, "y": -1670.24}, {"id": "class2_measure_3", "label": "措施3", "displayLabel": "③毒气泄漏：…", "type": "measure", "category": "class2", "table": null, "title": "③毒气泄漏：上风向设立警戒；人员必须SCBA；必要 高）易燃性为主，常伴随蒸气－空气爆炸风险、静电点火风险、强刺激/腐蚀灼伤、急性毒性（含经皮吸收/吸入危害）、麻醉作用与职业健康危害（致癌/致突变/生殖毒性/神经毒性等）；部分物质还存在久置生成爆炸性过氧化物、易自聚/爆聚（需阻聚与惰性气体保护）、遇水剧烈反应放出腐蚀性气体（如HCl）、含能或制爆前体受热/受震可能爆炸、燃烧分解产生高毒产物（如光气/氰化物等）等“叠加型”危险。因此运输与储存应以“控温+防火源+防静电+相容性隔离+状态监控”为核心：一般要求阴凉通风、库温多控制在约<29–37℃（或按物性更低温/冷藏）、避光密封、远离热源火种，全程防爆电气、接地防静电、轻装轻卸防震；对易聚合物质添加阻聚剂并按要求保持微量氧或充氮/氩惰化，对易形成过氧化物的溶剂限期管理并定期检测；对强腐蚀/遇水反应品严格防潮绝干、专用耐腐容器、与酸/氧化剂/还原剂/可燃物分区隔离；对剧毒/管制化学品与部分高危单体实行专库（或专用罐区）、双人双锁、严格通风与泄漏控制、台账可追溯及应急物资（如尾气吸收/解毒剂）配置，一旦出现胀桶、变色、异常气味、聚合迹象或过氧化物超限应立即隔离并按预案处置。\n3.1极易燃液体 (FP < 23℃, BP ≤ 35℃)\n注：部分特殊极易燃物（如二硫化碳）虽沸点稍高，但因极高危险性常在此列重点监管。\n3.2高度易燃液体 (FP < 23℃, BP > 35℃)\n3.3易燃液体 (23℃ ≤ FP ≤ 60℃)", "tooltip": "1.类别概述\n第3类是指闪点较低、在常温下能产生可燃蒸气并与空气形成可燃/爆炸性混合物的液体（以及含有易燃液体的混合物、溶液等）。其主要危险包括：\n①蒸气易燃易爆：蒸气比空气重时易在低洼处积聚，遇火源可回燃或发生蒸气云爆炸。\n②流淌火/蔓延快：泄漏后可沿地面、沟渠扩散，形成大面积燃烧面。\n③静电点火：灌装、倒料、过滤、喷溅等操作易积累静电，引发点燃。\n④容器受热破裂：火场中容器受热导致内压上升，出现喷射火、爆裂风险。\n⑤毒性/刺激性叠加：部分易燃液体同时具有毒性、麻醉性或刺激性（吸入高浓度蒸气可致昏迷甚至窒息）。\n实务提示：第3类的危险强度与闪点、沸点、蒸气压、爆炸极限等密切相关；现场以SDS与标签为准。\n2.易燃/有毒化学品的典型风险与运输储存要点概述\n这批化学品总体以高（或极高）易燃性为主，常伴随蒸气－空气爆炸风险、静电点火风险、强刺激/腐蚀灼伤、急性毒性（含经皮吸收/吸入危害）、麻醉作用与职业健康危害（致癌/致突变/生殖毒性/神经毒性等）；部分物质还存在久置生成爆炸性过氧化物、易自聚/爆聚（需阻聚与惰性气体保护）、遇水剧烈反应放出腐蚀性气体（如HCl）、含能或制爆前体受热/受震可能爆炸、燃烧分解产生高毒产物（如光气/氰化物等）等“叠加型”危险。因此运输与储存应以“控温+防火源+防静电+相容性隔离+状态监控”为核心：一般要求阴凉通风、库温多控制在约<29–37℃（或按物性更低温/冷藏）、避光密封、远离热源火种，全程防爆电气、接地防静电、轻装轻卸防震；对易聚合物质添加阻聚剂并按要求保持微量氧或充氮/氩惰化，对易形成过氧化物的溶剂限期管理并定期检测；对强腐蚀/遇水反应品严格防潮绝干、专用耐腐容器、与酸/氧化剂/还原剂/可燃物分区隔离；对剧毒/管制化学品与部分高危单体实行专库（或专用罐区）、双人双锁、严格通风与泄漏控制、台账可追溯及应急物资（如尾气吸收/解毒剂）配置，一旦出现胀桶、变色、异常气味、聚合迹象或过氧化物超限应立即隔离并按预案处置。\n3.1极易燃液体 (FP < 23℃, BP ≤ 35℃)\n注：部分特殊极易燃物（如二硫化碳）虽沸点稍高，但因极高危险性常在此列重点监管。\n3.2高度易燃液体 (FP < 23℃, BP > 35℃)\n3.3易燃液体 (23℃ ≤ FP ≤ 60℃)", "size": 18, "color": "#94a3b8", "textColor": "#475569", "x": 2210.14, "y": -468.05}, {"id": "class3_measure_1", "label": "措施1", "displayLabel": "①先控蒸气再…", "type": "measure", "category": "class3", "table": null, "title": "①先控蒸气再灭火：切断泄漏源、封堵/围堰，防流淌扩散。", "tooltip": "①先控蒸气再灭火：切断泄漏源、封堵/围堰，防流淌扩散。", "size": 15, "color": "#f59e0b", "textColor": "#b45309", "x": 2283.44, "y": -328.06}, {"id": "cla 化氢、硅烷、HCl、SO₂、H₂S、HCN、NH₃等易燃/剧毒/腐蚀性气体并可能爆炸；粉末/微细粉常见粉尘爆炸、自燃风险；部分“干燥后变猛”的体系（如某些起爆/含能或敏感盐类前体）在失水、摩擦、撞击、受热或光照下会显著增敏甚至爆炸，燃烧还可能生成P₂O₅、NOₓ等剧毒烟雾。因此储运管理以“隔绝空气与水、控温控湿、减敏与隔离”为核心：优先采用浸没保存（煤油/液状石蜡/水/乙醇等按物料适用性）或充氮/氩惰性气体密封，确保绝对干燥、防雨防潮、防泄漏；严格执行独立专库/甲类专库、远离热源火种与氧化剂/卤代烃/酸类等不相容物，全程防震防摩擦、防静电、轻装轻卸；对自反应/放气分解品落实低温（冷藏/冷库）、必要的排气或超温报警；对剧毒与可生成剧毒气体的物质实施双人双锁、全密闭系统或负压/尾气吸收、气体监测（如H₂S/CO等）、应急处置与专人台账；同时配备并明确D类灭火剂/干砂/蛭石等，并强调多种金属与金属粉严禁用水或泡沫扑救，以避免进一步的遇水放气与爆炸升级。\n4.1：易燃固体 (Flammable Solids)\n包含：易燃固体、自反应物质、减敏的爆炸品。\n4.2：自燃物质 (Spontaneously Combustible)\n包含：发火物质（接触空气立即燃烧）、自热物质（堆积发热燃烧）。\n4.3：遇水放出易燃气体的物质 (Emits Flammable Gas with Water)\n特性：遇水释放氢气、乙炔、磷化氢等，极易引发燃烧爆炸。\n先判定是否“遇水反应”：4.3类严禁直接大量用水；优先干粉、干砂覆盖、隔绝水源。\n自燃物（4.2）：暴露空气可自燃，尽量保持原包装密闭/惰化（由专业人员实施），消防以隔离与冷却周边为主。\n易燃固体（4.1）：防粉尘扬散；采用适当灭火剂（干粉/泡沫/雾状水视物质而定）。\n库区管理：防雨、防潮，灭火废水不得冲入反应性物质堆垛。", "tooltip": "类别概述\n第4类物质以“容易引燃、容易自燃或遇水反应放出可燃气体”为主要特征，常见风险包括：易燃固体：点火能量低，摩擦/火花即可引燃；粉末可产生粉尘火灾甚至爆炸。易自燃物质：与空气接触可自热并自燃，堆积时风险增大。遇水放出易燃气体物质：与水/潮气反应生成氢气等可燃气体，可能引发燃烧或爆炸。 实务上，防潮、防摩擦、防粉尘、控制堆积与隔离水源是核心。\n自燃、遇水反应与高敏物质的典型风险与储运要点概述\n这类物质的共同特点是反应活性极高、起火/爆炸触发条件低：不少在空气中即可自燃或因氧化自热引发燃烧；大量品种遇水/潮气或酸即剧烈反应，放出氢气、乙炔、磷化氢/砷化氢/锑化氢、硅烷、HCl、SO₂、H₂S、HCN、NH₃等易燃/剧毒/腐蚀性气体并可能爆炸；粉末/微细粉常见粉尘爆炸、自燃风险；部分“干燥后变猛”的体系（如某些起爆/含能或敏感盐类前体）在失水、摩擦、撞击、受热或光照下会显著增敏甚至爆炸，燃烧还可能生成P₂O₅、NOₓ等剧毒烟雾。因此储运管理以“隔绝空气与水、控温控湿、减敏与隔离”为核心：优先采用浸没保存（煤油/液状石蜡/水/乙醇等按物料适用性）或充氮/氩惰性气体密封，确保绝对干燥、防雨防潮、防泄漏；严格执行独立专库/甲类专库、远离热源火种与氧化剂/卤代烃/酸类等不相容物，全程防震防摩擦、防静电、轻装轻卸；对自反应/放气分解品落实低温（冷藏/冷库）、必要的排气或超温报警；对剧毒与可生成剧毒气体的物质实施双人双锁、全密闭系统或负压/尾气吸收、气体监测（如H₂S/CO等）、应急处置与专人台账；同时配备并明确D类灭火剂/干砂/蛭石等，并强调多种金属与金属粉严禁用水或泡沫扑救，以避免进一步的遇水放气与爆炸升级。\n4.1：易燃固体 (Flammable Solids)\n包含：易燃固体、自反应物质、减敏的爆炸品。\n4.2：自燃物质 (Spontaneously Combustible)\n包含：发火物质（接触空气立即燃烧）、自热物质（堆积发热燃烧）。\n4.3：遇水放出易燃气体的物质 (Emits Flammable Gas with Water)\n特性：遇水释放氢气、乙炔、磷化氢等，极易引发燃烧爆炸。\n先判定是否“遇水反应”：4.3类严禁直接大量用水；优先干粉、干砂覆盖、隔绝水源。\n自燃物（4.2）：暴露空气可自燃，尽量保持原包装密闭/惰化（由专业人员实施），消防以隔离与冷却周边为主。\n易燃固体（4.1）：防粉尘扬散；采用适当灭火剂（干粉/泡沫/雾状水视物质而定）。\n库区管理：防雨、防潮，灭火废水不得冲入反应性物质堆垛。", "size": 18, "color": "#94a3b8", "textColor": "#475569", "x": 1993.91, "y": 1062.11}, {"id": "class4_ 氢化钙", "type": "substance", "category": "class4", "table": "class4_table_2", "title": "硫氢化钙\n序号: 75\n物质名称: 硫氢化钙\nCAS No.: 12133-28-7\n典型危险性: 氧化发热，遇水/酸放H₂S。\n运输储存条件: 玻璃瓶加木箱，禁酸。", "tooltip": "CAS：12133-28-7\n危险性：氧化发热，遇水/酸放H₂S。\n储运：玻璃瓶加木箱，禁酸。\n危险标签：遇水反应", "size": 10, "color": "#22c55e", "textColor": "#334155", "x": 2190.16, "y": 1476.18}, {"id": "class5", "label": "第5类 氧化性物质和有机过氧化物", "displayLabel": "第5类 氧化性物质和有机过氧化物", "type": "category", "category": "class5", "table": null, "title": "第5类 氧化性物质和有机过氧化物", "tooltip": "第5类 氧化性物质和有机过氧化物", "size": 38, "color": "#f59e0b", "textColor": "#f59e0b", "x": 729.18, "y": 2003.42}, {"id": "class5_overview", "label": "类别概述", "displayLabel": "概述", "type": "overview", "category": "class5", "table": null, "title": "类别概述\n第5类以“供氧或自身分解放热”为核心危险：氧化性物质：本身不一定可燃，但能释放氧或强化氧化反应，使其他可燃物燃烧更猛烈、更难扑灭。有机过氧化物：对热、摩擦、污染更敏感，可能发生自加速分解（温度越高分解越快），导致火灾甚至爆炸。关键控制点通常是：控温、避免污染混入、与可燃物隔离、持续冷却能力。\n强氧化剂与有机过氧化物的典型风险与储运要点概述\n这两类物质的核心危险在于强助燃/强氧化与热不稳定分解：强氧化剂普遍会在受热、受潮或与可燃物/有机物/还原剂接触时发生剧烈氧化反应，显著加速燃烧甚至引发燃爆；含氯氧化剂还可能在分解或遇酸时释放氯气等刺激性有毒气体，且对污染/金属杂质敏感，部分高浓度体系存在分解爆炸风险。有机过氧化物则具有明显的自加速分解（SADT）特征，受热、摩擦、冲击或污染可出现放热放气、压力升高、火灾爆炸与爆炸传播，并表现出不同等级的“冷敏感”与包装分级（如OP4/OP5/OP6/OP7/OP8等）要求。对应的储运原则是“低温控湿、隔离不相容物、严控污染与热源、专用包装与监测”：强氧化剂应阴凉干燥、密封（必要时充惰性气体）、避光通风，严格做到与水分、酸类、可燃物、有机物、还原剂、硫磺/油脂等分区隔离，并选用耐腐蚀塑料/玻璃等专用容器、避免金属杂质；有机过氧化物通常需冷藏/冷库或低温冷链运输（高风险甚至超低温与批准运输），库内应进行温度连续监测/超温报警，按规定采用退敏稀释剂或水分散/糊状等稳定形态与相应OP包装，并实施限量独立存放、通风排气（按包装要求）、防震防摩擦防静电和严格的进出库管理，以把“分解失控”和“与可燃物/杂质接触”的触发概率降到最低。\n5.1：氧化性物质\n5.2：有机过氧化物\n把它当“会自己加火的火”：火势会异常猛烈，普通灭火策略可能失效。\n大量冷却优先：5.2有机过氧化物对温度敏感，持续冷却是关键（注意包装破裂喷溅风险）。\n严禁与可燃物混放处置：现场优先清空周边可燃物，阻断蔓延。\n避免污染与混合：灭火剂、吸附材料不要引入可燃污染；泄漏物不要与还原剂/金属粉等接触。\n预警信号：鼓包、冒白烟、噼啪声、温升失控——立即扩大撤离圈。", "tooltip": "类别概述\n第5类以“供氧或自身分解放热”为核心危险：氧化性物质：本身不一定可燃，但能释放氧或强化氧化反应，使其他可燃物燃烧更猛烈、更难扑灭。有机过氧化物：对热、摩擦、污染更敏感，可能发生自加速分解（温度越高分解越快），导致火灾甚至爆炸。关键控制点通常是：控温、避免污染混入、与可燃物隔离、持续冷却能力。\n强氧化剂与有机过氧化物的典型风险与储运要点概述\n这两类物质的核心危险在于强助燃/强氧化与热不稳定分解：强氧化剂普遍会在受热、受潮或与可燃物/有机物/还原剂接触时发生剧烈氧化反应，显著加速燃烧甚至引发燃爆；含氯氧化剂还可能在分解或遇酸时释放氯气等刺激性有毒气体，且对污染/金属杂质敏感，部分高浓度体系存在分解爆炸风险。有机过氧化物则具有明显的自加速分解 , "title": "类别概述\n第6类以“对人体健康造成直接危害”为突出特征：\n6.1 毒性物质：可通过吸入、摄入或皮肤吸收导致急性或慢性中毒，部分具有致癌/致突变/生殖毒性。\n6.2 感染物质：含致病性微生物或其毒素，可能引起人或动物疾病并具有传播风险。处置重点是：暴露控制（呼吸/皮肤）、污染控制（洗消、封控）、医疗处置联动。\n剧毒/高毒化学品与毒性气体的典型风险与储运要点概述\n这组物质的共同特征是以急性毒性为主导风险，暴露途径包括吸入、吞咽与经皮吸收，可在短时间内造成中枢神经系统抑制或损伤、呼吸道/肺组织严重损害（窒息性或刺激性毒气）、循环系统功能紊乱、造血与血液系统毒性（如高铁血红蛋白血症/组织缺氧）、肝肾等多器官毒性，其中部分还具有致癌、致突变、致敏等长期健康危害；若涉及可释放氰化氢/氰化物或“光气样”毒性气体的物质，急性致死风险更高，且部分品种还叠加受热/撞击可能发生危险反应、自燃或（少数）毒性与爆炸双重风险。因此运输与储存的核心是“全程密闭防泄漏 + 专库通风隔离 + 严格管控与监测”：运输应选用密闭、耐腐蚀/高强度容器或合格压力钢瓶，重点防渗漏、破损、受热与误用；储存应在阴凉、通风的专用库房/专用区域进行，设置泄漏监测与应急处置条件，并按相容性要求与氧化剂、酸类等不相容物隔离，防潮防酸以避免生成/释放高毒气体；对剧毒与高危险毒气/高经皮毒性品实行更高等级管理（如双人双锁、专人保管、台账可追溯、限量存放），同时强化防尘防挥发、必要的低温避光、个人防护与职业健康管理，以最大限度降低暴露于群体性中毒风险。\n默认呼吸防护升级：不明毒物环境优先SCBA；高风险化学品可用化防服（至少B级）。\n去污和隔离流程：设置洗消线，人员/器材/废水分流；避免把污染带出热区。\n6.1（毒性）：优先堵漏与通风稀释；防皮肤接触（双层手套、防化靴）。\n6.2（感染性）：按生物危害处置：封控、最小接触、锐器管理、医疗废物包装；必要时与疾控/医院联动。\n现场医疗准备：解毒/急救信息从SDS获取；中毒症状人员及时撤离与医疗转运。", "tooltip": "类别概述\n第6类以“对人体健康造成直接危害”为突出特征：\n6.1 毒性物质：可通过吸入、摄入或皮肤吸收导致急性或慢性中毒，部分具有致癌/致突变/生殖毒性。\n6.2 感染物质：含致病性微生物或其毒素，可能引起人或动物疾病并具有传播风险。处置重点是：暴露控制（呼吸/皮肤）、污染控制（洗消、封控）、医疗处置联动。\n剧毒/高毒化学品与毒性气体的典型风险与储运要点概述\n这组物质的共同特征是以急性毒性为主导风险，暴露途径包括吸入、吞咽与经皮吸收，可在短时间内造成中枢神经系统抑制或损伤、呼吸道/肺组织严重损害（窒息性或刺激性毒气）、循环系统功能紊乱、造血与血液系统毒性（如高铁血红蛋白血症/组织缺氧）、肝肾等多器官毒性，其中部分还具有致癌、致突变、致敏等长期健康危害；若涉及可释放氰化氢/氰化物或“光气样”毒性气体的物质，急性致死风险更高，且部分品种还叠加受热/撞击可能发生危险反应、自燃或（少数）毒性与爆炸双重风险。因此运输与储存的核心是“全程密闭防泄漏 + 专库通风隔离 + 严格管控与监测”：运输应选用密闭、耐腐蚀/高强度容器或合格压力钢瓶，重点防渗漏、破损、受热与误用；储存应在阴凉、通风的专用库房/专用区域进行，设置泄漏监测与应急处置条件，并按相容性要求与氧化剂、酸类等不相容物隔离，防潮防酸以避免生成/释放高毒气体；对剧毒与高危险毒气/高经皮毒性品实行更高等级管理（如双人双锁、专人保管、台账可追溯、限量存放），同时强化防尘防挥发、必要的低温避光、个人防护与职业健康管理，以最大限度降低暴露于群体性中毒风险。\n默认呼吸防护升级：不明毒物环境优先SCBA；高风险化学品可用化防服（至少B级）。\n去污和隔离流程：设置洗消线，人员/器材/废水分流；避免把污染带出热区。\n6.1（毒性）：优先堵漏与通风稀释；防皮肤接触（双层手套、防化靴）。\n6.2（感染性）：按生物危害处置：封控、最小接触、锐器管理、医疗废物包装；必要时与疾控/医院联动。\n现场医疗准备：解毒/急救信息从SDS获取；中毒症状人员及时撤离与医疗转运。", "size": 18, "color": "#94a3b8", "textColor": "#475569", "x": -699.73, "y": 2148.06}, {"id": "class6_table_1", "label": "表A-13 第6类毒性物质和感染性物质典型条目", "displayLabel": "A-13 第6类毒性物质和感…", "type": "table", "category": "class6", "table": "class6_t 或屏蔽专用容器（源体按活度选A型/B型；中子源需含聚乙烯/硼等中子屏蔽；乏燃料使用经批准的重屏蔽运输容器），全程防震防破、必要时温控与固定防振；储存应在干燥通风或专用源库/放废库/受控水池或干式贮存系统内分区限量，设置清晰辐射标识、剂量率与表面擦拭污染监测、人员剂量计与访问控制，并对高风险核材料/高活度源实行双人双锁、视频门禁、台账追溯、定期密封性检验与盘点；对放射性药品/实验核素强调二次包装、专用柜/冰箱（按制剂冷藏避光）、局排/通风橱操作、锐器与废液分类收集及衰变贮存/规范移交；对废物桶、滤芯、树脂等则重点控制防渗地坪/托盘围堰、桶体完好性（腐蚀/鼓包）检查与渗漏监测，以降低污染扩散与误用/丢失带来的系统性风险。\n三原则：时间最短、距离最大、屏蔽最佳（Time–Distance–Shielding）。\n先监测后进入：剂量率仪、污染监测；设定剂量控制值与撤离阈值（由专业辐射人员/主管部门确定）。\n防污染扩散：不随意冲水；优先覆盖、围堵、收集；人员出热区必须洗消并记录剂量。\n火灾处置：以冷却和隔离为主，避免烟尘吸入；SCBA必备。\n协同机制：尽早请求辐射应急/监管部门、专业处置队伍支援。", "tooltip": "类别概述\n第7类是指能发射电离辐射的物质或物品。主要风险包括：\n外照射（γ/中子等）导致急慢性辐射损伤\n内照射（吸入/摄入污染）导致靶器官剂量累积\n放射性污染扩散（表面污染、粉尘、废液）造成环境与人员二次暴露核心原则：时间最短、距离最大、屏蔽最好，并强化监测与洗消。\n放射性物质与放射源的典型风险与运输储存要点概述\n这类物质的主要风险可归纳为三条主线：一是外照射（γ/中子源及乏燃料等剂量率高、误照可致急性伤害，且乏燃料还伴随衰变热）；二是内照射与污染扩散（α粉末/细颗粒最敏感，粉尘吸入或摄入会造成长期累积剂量，固化体/树脂/滤芯/废物桶破损可引起表面与环境污染、交叉污染）；三是化学与工艺叠加风险（如UF₆遇水水解产生HF与UO₂F₂的强腐蚀与化学毒性，某些放药制剂挥发/溅洒与患者体液带来二次污染，部分核材料还涉及临界安全与安保防盗）。对应的储运管理以“密闭防散落/防泄漏、分区受控、监测巡检、安保可追溯”为核心：运输普遍采用防散落双层包装或屏蔽专用容器（源体按活度选A型/B型；中子源需含聚乙烯/硼等中子屏蔽；乏燃料使用经批准的重屏蔽运输容器），全程防震防破、必要时温控与固定防振；储存应在干燥通风或专用源库/放废库/受控水池或干式贮存系统内分区限量，设置清晰辐射标识、剂量率与表面擦拭污染监测、人员剂量计与访问控制，并对高风险核材料/高活度源实行双人双锁、视频门禁、台账追溯、定期密封性检验与盘点；对放射性药品/实验核素强调二次包装、专用柜/冰箱（按制剂冷藏避光）、局排/通风橱操作、锐器与废液分类收集及衰变贮存/规范移交；对废物桶、滤芯、树脂等则重点控制防渗地坪/托盘围堰、桶体完好性（腐蚀/鼓包）检查与渗漏监测，以降低污染扩散与误用/丢失带来的系统性风险。\n三原则：时间最短、距离最大、屏蔽最佳（Time–Distance–Shielding）。\n先监测后进入：剂量率仪、污染监测；设定剂量控制值与撤离阈值（由专业辐射人员/主管部门确定）。\n防污染扩散：不随意冲水；优先覆盖、围堵、收集；人员出热区必须洗消并记录剂量。\n火灾处置：以冷却和隔离为主，避免烟尘吸入；SCBA必备。\n协同机制：尽早请求辐射应急/监管部门、专业处置队伍支援。", "size": 18, "color": "#94a3b8", "textColor": "#475569", "x": -1916.77, "y": 1195.73}, {"id": "class7_table_1", "label": "表A-14 第7类放射性物品典型条目", "displayLabel": "A-14 第7类放射性物品", "type": "table", "category": "class7", "table": "class7_table_1", "title": "表A-14 第7类放射性物品典型条目", "tooltip": "表A-14 第7类放射性物品典型条目", "size": 24, "color": "#64748b", "textColor": "#64748b", "x": -2158.83, "y": 1246.4}, {"id": "class7_table_1_r1", "label": "铀矿石", "displayLabel": "铀矿石", "type": "substance", "category": "class7", "table": "class7_table_1", "title": "铀矿石\ 性酸雾或腐蚀性气体刺激呼吸道、对金属与设备的腐蚀破坏等风险；其中部分还兼具强氧化性或毒性（如可穿透皮肤造成深部组织损伤、分解/水解释放刺激性气体、反应活性带来二次危险），而混合酸碱及腐蚀性危废由于成分复杂、杂质不确定，环境危害与事故不确定性更高。相应的运输与储存原则是“选对容器、密闭防漏、控温通风、隔离相容性、危废规范化”：运输优先采用耐酸耐碱/耐腐蚀专用密闭容器（氟化物等需耐氟材质），全程防渗漏、防破损，必要时避光、低温或防震；储存应在阴凉通风、耐腐蚀库房内，保持密闭、防潮（尤其是碱性固体/吸湿品），并根据反应性与氧化性要求与水、可燃物、还原剂及其他不相容物分区隔离；对“遇水剧烈反应/放热放气”的品种执行更严格的专库受控与低温管理；对腐蚀性危废则按危险废物要求使用专用容器与危废库储运，做到分类标识、密闭、专库专管，必要时落实双人管理与防泄漏措施，以降低人员灼伤、设备腐蚀与环境污染风险。\n防护优先：防化服、面屏、耐腐蚀手套靴；眼部冲洗条件到位。\n先堵漏再中和（慎用）：中和会放热、飞溅，必须由专业条件与SDS支持下实施；一般优先围堵、转移、稀释（对可稀释者）。\n防氢气：酸与金属反应可能产氢，注意可燃气监测与点火源控制。\n防地面渗漏：围堰、吸附、收集废液；禁止直接排入雨水系统。", "tooltip": "类别概述\n第8类能通过化学作用对活体组织或金属产生严重腐蚀。主要风险包括：\n皮肤/眼灼伤、吸入刺激与肺损伤\n容器腐蚀穿孔导致二次泄漏与扩大污染\n与金属反应放氢引发可燃风险；与其他化学品混合可能放热、放毒处置关键：防护优先、围堵防渗、谨慎中和、严控混合反应。\n腐蚀性酸碱及腐蚀性危废的典型风险与储运要点概述\n这类物质总体以强腐蚀性为核心危险，既包括强酸/强碱对皮肤、眼睛与黏膜造成的深度化学灼伤，也常叠加脱水性、强放热性（与水混合/水解放热剧烈）、挥发性酸雾或腐蚀性气体刺激呼吸道、对金属与设备的腐蚀破坏等风险；其中部分还兼具强氧化性或毒性（如可穿透皮肤造成深部组织损伤、分解/水解释放刺激性气体、反应活性带来二次危险），而混合酸碱及腐蚀性危废由于成分复杂、杂质不确定，环境危害与事故不确定性更高。相应的运输与储存原则是“选对容器、密闭防漏、控温通风、隔离相容性、危废规范化”：运输优先采用耐酸耐碱/耐腐蚀专用密闭容器（氟化物等需耐氟材质），全程防渗漏、防破损，必要时避光、低温或防震；储存应在阴凉通风、耐腐蚀库房内，保持密闭、防潮（尤其是碱性固体/吸湿品），并根据反应性与氧化性要求与水、可燃物、还原剂及其他不相容物分区隔离；对“遇水剧烈反应/放热放气”的品种执行更严格的专库受控与低温管理；对腐蚀性危废则按危险废物要求使用专用容器与危废库储运，做到分类标识、密闭、专库专管，必要时落实双人管理与防泄漏措施，以降低人员灼伤、设备腐蚀与环境污染风险。\n防护优先：防化服、面屏、耐腐蚀手套靴；眼部冲洗条件到位。\n先堵漏再中和（慎用）：中和会放热、飞溅，必须由专业条件与SDS支持下实施；一般优先围堵、转移、稀释（对可稀释者）。\n防氢气：酸与金属反应可能产氢，注意可燃气监测与点火源控制。\n防地面渗漏：围堰、吸附、收集废液；禁止直接排入雨水系统。", "size": 18, "color": "#94a3b8", "textColor": "#475569", "x": -2236.93, "y": -316.09}, {"id": "class8_table_1", "label": "表A-15 第8类腐蚀性物质典型条目", "displayLabel": "A-15 第8类腐蚀性物质", "type": "table", "category": "class8", "table": "class8_table_1", "title": "表A-15 第8类腐蚀性物质典型条目", "tooltip": "表A-15 第8类腐蚀性物质典型条目", "size": 24, "color": "#ef4444", "textColor": "#ef4444", "x": -2454.93, "y": -432.87}, {"id": "class8_table_1_r1", "label": "硫酸", "displayLabel": "硫酸", "type": "substance", "category": "class8", "table": "class8_table_1", "title": "硫酸\n序号: 1\n物质名称: 硫酸\nCAS No.: 7664-93-9\n典型危险性: 强腐蚀性和脱水性，接触皮肤可造成深度化学灼伤，与水混合放热剧烈。\n运输与储存条件: 采用耐酸密闭容器运输；储存于阴凉、通风、耐腐蚀库房。 : "概述", "type": "overview", "category": "class9", "table": null, "title": "类别概述\n第9类涵盖不属于1～8类但仍对运输/储存安全或环境构成危害的物质与物品。常见风险类型：\n环境危害（对水生生态有害、持久性污染、海洋污染物等）\n锂电池热失控（起火、爆炸、毒烟、复燃）\n窒息/低温风险（如干冰释放CO₂、深冷物质冻伤）\n磁性危害（影响航空仪表/设备）\n高温物质（灼伤、引燃、容器受热风险）关键是：识别具体风险类型并匹配相应控制措施。\n锂电池、窒息冷源与环境危害物的典型风险与储运要点概述\n这组货物的危险类型高度“多元叠加”：锂离子/锂金属电池在挤压、短路、过充或受热时可能发生热失控，引起起火爆炸、喷射熔融物并释放有毒烟气，受潮浸水或破损还会增加内部短路与燃烧难度；干冰等冷源则以CO₂升华积聚导致窒息和低温冻伤/容器增压破裂为主；而大量“环境危害物”（包括持久性有机污染物、卤代有机物/溶剂、有机锡、重金属化合物、农药/杀生剂类粉体等）主要风险是泄漏进入水体或土壤造成长期生态破坏与生物富集，同时常伴随刺激/腐蚀、蒸气暴露、粉尘扩散二次污染；纤维类（如石棉/高致病纤维）则突出可吸入纤维导致职业病/致癌，破碎切割易造成难治理的环境释放；另外，强磁性物质存在干扰导航仪表与损坏精密设备风险，气体发生器/点火装置与压力容器类货物则可能因受热、撞击或误触发快速释能或增压伤人。对应的储运控制要点是：对电池类实行防短路（端子绝缘/隔板）、防挤压跌落、远离热源火源、合规包装与通风控温+温度监测，破损/异常电池必须单独隔离且严禁违规充电；对干冰坚持通风与“可释压包装”，禁止完全密闭并加强防冻伤PPE；对环境危害/持久污染物普遍采取密闭防渗+二次围堵（托盘/围堰）、库房防雨防渗、通风阴凉、与食品饲料隔离，泄漏处置遵循先围堵后吸附/干法回收，严禁冲入下水，所有污染物与清理介质按危废流转；对纤维危害物强调双层密封、禁破袋、湿法或HEPA清理、专库隔离与人员防护；对强磁性物质做磁屏蔽/减磁包装与隔离标识；对点火/气体发生器、压力容器与高温液体/熔融物实施防热防撞击、固定防滚动/防倾覆、留膨胀空间、禁拆解、台账管理与定检，以系统性降低火灾爆炸、窒息冻伤与长期环境污染三类后果的发生概率。\n锂电池火灾：优先隔离与降温，防复燃；关注相邻电池“链式热失控”；废水与残渣按污染物管理。\n干冰/惰性气体窒息：重点监测氧含量；密闭空间先通风后进入。\n环境危害物：围堵防外排，消防废水必须收集或导流，避免入河入井。\n磁性物质：航空/医疗设备等场景注意影响；现场主要是运输/设备安全提示与隔离", "tooltip": "类别概述\n第9类涵盖不属于1～8类但仍对运输/储存安全或环境构成危害的物质与物品。常见风险类型：\n环境危害（对水生生态有害、持久性污染、海洋污染物等）\n锂电池热失控（起火、爆炸、毒烟、复燃）\n窒息/低温风险（如干冰释放CO₂、深冷物质冻伤）\n磁性危害（影响航空仪表/设备）\n高温物质（灼伤、引燃、容器受热风险）关键是：识别具体风险类型并匹配相应控制措施。\n锂电池、窒息冷源与环境危害物的典型风险与储运要点概述\n这组货物的危险类型高度“多元叠加”：锂离子/锂金属电池在挤压、短路、过充或受热时可能发生热失控，引起起火爆炸、喷射熔融物并释放有毒烟气，受潮浸水或破损还会增加内部短路与燃烧难度；干冰等冷源则以CO₂升华积聚导致窒息和低温冻伤/容器增压破裂为主；而大量“环境危害物”（包括持久性有机污染物、卤代有机物/溶剂、有机锡、重金属化合物、农药/杀生剂类粉体等）主要风险是泄漏进入水体或土壤造成长期生态破坏与生物富集，同时常伴随刺激/腐蚀、蒸气暴露、粉尘扩散二次污染；纤维类（如石棉/高致病纤维）则突出可吸入纤维导致职业病/致癌，破碎切割易造成难治理的环境释放；另外，强磁性物质存在干扰导航仪表与损坏精密设备风险，气体发生器/点火装置与压力容器类货物则可能因受热、撞击或误触发快速释能或增压伤人。对应的储运控制要点是：对电池类实行防短路（端子绝缘/隔板）、防挤压跌落、远离热源火源、合规包装与通风控温+温度监测，破损/异常电池必须单独隔离且严禁违规充电；对干冰坚持通风与“可释压包装”，禁止完全密闭并加强防冻伤PPE；对环境危害/持久污染物普遍采取密闭防渗+二次围堵（托盘/围堰）、库房防雨防渗、通风阴凉、与食品饲料隔离，泄漏处置遵循先围堵后吸附/干法回收，严禁冲入下水，所有污染物与清理介质按危废流转；对纤维危害物强调双层密封、禁破袋、湿法或HEPA清理、专库隔离与人员防护；对强磁性物质做磁屏蔽/减磁包装与隔离标识；对点火/气体发生器、压力容器与高温液体/熔融物实施防热防撞击、固定防滚动 const NS = "http://www.w3.org/2000/svg";

function el(name, attrs={}) {
  const node = document.createElementNS(NS, name);
  for (const [k, v] of Object.entries(attrs)) {
    node.setAttribute(k, v);
  }
  return node;
}

const edgeEls = [];
const nodeEls = new Map();

graph.edges.forEach(e => {
  const a = nodeMap.get(e.source);
  const b = nodeMap.get(e.target);
  const line = el("line", {
    x1: a.x, y1: a.y, x2: b.x, y2: b.y,
    class: `edge ${e.type}`,
    "data-source": e.source,
    "data-target": e.target
  });
  line.style.stroke = e.type === "root" ? "#94a3b8" : a.color || "#cbd5e1";
  viewport.appendChild(line);
  edgeEls.push(line);
});

graph.nodes.forEach(n => {
  const g = el("g", { class: `node ${n.type}`, transform: `translate(${n.x},${n.y})`, "data-id": n.id });
  const circle = el("circle", {
    r: n.size,
    fill: n.type === "substance" ? n.color : (n.type === "table" ? n.color : n.color),
    opacity: n.type === "substance" ? 0.72 : 0.95
  });
  const text = el("text", {
    y: n.size + 6,
    fill: n.textColor || "#334155"
  });
  text.textContent = n.displayLabel;
  g.appendChild(circle);
  g.appendChild(text);
  g.addEventListener("click", (ev) => {
    ev.stopPropagation();
    selectNode(n.id);
  });
  viewport.appendChild(g);
  nodeEls.set(n.id, g);
});

let state = { x: 0, y: 0, scale: 1 };
let dragging = false;
let last = null;
let selectedId = null;

function applyTransform() {
  viewport.setAttribute("transform", `translate(${state.x},${state.y}) scale(${state.scale})`);
}

function fitGraph(padding=95) {
  const w = svg.clientWidth || window.innerWidth;
  const h = svg.clientHeight || window.innerHeight;
  const b = graph.bounds;
  const gw = b.maxX - b.minX;
  const gh = b.maxY - b.minY;
  const sx = (w - padding * 2) / gw;
  const sy = (h - padding * 2) / gh;
  state.scale = Math.max(0.12, Math.min(1.6, Math.min(sx, sy)));
  state.x = w / 2 - ((b.minX + b.maxX) / 2) * state.scale;
  state.y = h / 2 - ((b.minY + b.maxY) / 2) * state.scale;
  applyTransform();
}

function zoomAt(factor, clientX, clientY) {
  const rect = svg.getBoundingClientRect();
  const px = clientX - rect.left;
  const py = clientY - rect.top;
  const prev = state.scale;
  const next = Math.max(0.1, Math.min(4, prev * factor));
  const wx = (px - state.x) / prev;
  const wy = (py - state.y) / prev;
  state.scale = next;
  state.x = px - wx * next;
  state.y = py - wy * next;
  applyTransform();
}

svg.addEventListener("wheel", (e) => {
  e.preventDefault();
  zoomAt(e.deltaY < 0 ? 1.12 : 0.89, e.clientX, e.clientY);
}, { passive: false });

svg.addEventListener("mousedown", (e) => {
  dragging = true;
  last = { x: e.clientX, y: e.clientY };
  svg.classList.add("dragging");
});

window.addEventListener("mousemove", (e) => {
  if (!dragging) return;
  const dx = e.clientX - last.x;
  const dy = e.clientY - last.y;
  state.x += dx;
  state.y += dy;
  last = { x: e.clientX, y: e.clientY };
  applyTransform();
});

window.addEventListener("mouseup", () => {
  dragging = false;
  svg.classList.remove("dragging");
});

svg.addEventListener("click", () => {
  clearSelection();
});

document.getElementById("zoomIn").addEventListener("click", () => {
  zoomAt(1.15, svg.clientWidth / 2, svg.clientHeight / 2);
});
document.getElementById("zoomOut").addEventListener("click", () => {
  zoomAt(0.87, svg.clientWidth / 2, svg.clientHeight / 2);
});
document.getElementById("fitBtn").addEventListener("click", () => fitGraph());
document.getElementById("resetBtn").addEventListener("click", () => {
  fitGraph();
});

function detailHtml(n) {
  const typeName = {
    root: "中心节点",
    category: "类别节点",
    overview: "概述节点",
    measure: "措施节点",
    table: "表格节点",
    substance: "条目节点"
  }[n.type] || n.type;

  const cat = n.category ? (nodeMap.get(n.category)?.label || n.category) : "—";
  const table = n.table ? (nodeMap.get(n.table)?.label || n.table) : "—";
  return `
    <h2>${n.label}</h2>
    <div class="sub">${typeName}</div>
    <div class="meta">
      <div class="k">所属类</div><div>${cat}</div>
      <div class="k">所属表</div><div>${table}</div>
      <div class="k">关联数</div><div>${adjacency.get(n.id)?.size || 0}</div>
    </div>
    <div class="box">${(n.tooltip || n.title || n.label).replace(/\n/g, "<br>")}</div>
  `;
}

function clearSelection() {
  selectedId = null;
  nodeEls.forEach(el => el.classList.remove("selected", "dim"));
  edgeEls.forEach(el => el.classList.remove("dim"));
  info.innerHTML = `
    <h2>危险化学品知识图谱</h2>
    <div class="sub">节点详情与结构概览</div>
    <div class="meta">
      <div class="k">节点</div><div>866</div>
      <div class="k">连线</div><div>865</div>
      <div class="k">类别</div><div>9大类 / 16张表 / 817个条目</div>
    </div>
    <div class="legend">
      <div><span class="swatch" style="background:#111827"></span>中心</div>
      <div><span class="swatch" style="background:#475569"></span>类别概述</div>
      <div><span class="swatch" style="background:#f59e0b"></span>建议措施</div>
      <div><span class="swatch" style="background:#94a3b8"></span>表格 / 条目</div>
    </div>
    <div class="box">请选择节点查看详细信息。</div>
  `;
}

function selectNode(id) {
  selectedId = id;
  const set = adjacency.get(id) || new Set();
  nodeEls.forEach((g, nid) => {
    g.classList.toggle("selected", nid === id);
    g.classList.toggle("dim", !(nid === id || set.has(nid)));
  });
  edgeEls.forEach(line => {
    const s = line.getAttribute("data-source");
    const t = line.getAttribute("data-target");
    const active = (s === id || t === id);
    line.classList.toggle("dim", !active);
  });
  info.innerHTML = detailHtml(nodeMap.get(id));
}

window.addEventListener("resize", () => fitGraph());
fitGraph();
